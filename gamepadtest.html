<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>調整ゲームパッド</title>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: sans-serif;
  overflow: hidden;
}

/* ログ */
#log {
  position: absolute;
  top: 10px;
  left: 10px;
}

/* ⭐ スティック（右上に少し移動） */
#zone {
  position: absolute;
  bottom: 60px;  /* ← 上に移動 */
  left: 60px;    /* ← 右に移動 */
  width: 150px;
  height: 150px;
}

/* ⭐ ボタンコンテナ（左に寄せる） */
#pad {
  position: absolute;
  bottom: 40px;
  right: 100px;  /* ← 左に移動 */

  width: 200px;
  height: 200px;
}

/* ボタン共通 */
.btn {
  position: absolute;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  border: 2px solid white;
  text-align: center;
  line-height: 60px;
  font-size: 20px;
}

/* 配置（そのまま） */
#btnA { left: 130px; top: 70px; }
#btnB { left: 70px; top: 130px; }
#btnY { left: 10px; top: 70px; }
#btnX { left: 70px; top: 10px; }

.btn:active {
  background: rgba(255,255,255,0.5);
}
</style>
</head>

<body>

<div id="log">操作待機中...</div>

<div id="zone"></div>

<div id="pad">
  <div id="btnA" class="btn">A</div>
  <div id="btnB" class="btn">B</div>
  <div id="btnX" class="btn">X</div>
  <div id="btnY" class="btn">Y</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>

<script>
const log = document.getElementById("log");

/* スティック */
const joystick = nipplejs.create({
  zone: document.getElementById('zone'),
  mode: 'static',
  position: { left: '50%', top: '50%' },
  color: 'white'
});

joystick.on('move', (evt, data) => {
  if (!data.direction) return;
  log.textContent = "スティック: " + data.direction.angle;
});

joystick.on('end', () => {
  log.textContent = "操作待機中...";
});

/* ボタン */
function setupButton(id, name) {
  const btn = document.getElementById(id);

  const press = () => log.textContent = name + " 押された";
  const release = () => log.textContent = "操作待機中...";

  btn.addEventListener("touchstart", press);
  btn.addEventListener("touchend", release);
  btn.addEventListener("mousedown", press);
  btn.addEventListener("mouseup", release);
}

setupButton("btnA", "A");
setupButton("btnB", "B");
setupButton("btnX", "X");
setupButton("btnY", "Y");
</script>

</body>
</html>
