<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Gamepad Debug UI</title>

<style>
body {
  margin:0;
  background:#111;
  font-family:monospace;
  color:white;
}

/* ===== コンテナ ===== */
#debugContainer {
  position:absolute;
  top:20px;
  left:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* ===== 行 ===== */
.row {
  display:flex;
  gap:10px;
}

/* ===== ボタン表示 ===== */
.key {
  width:60px;
  height:60px;
  border-radius:12px;
  background:#333;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  border:2px solid #555;
  transition:0.1s;
}

/* 押されてる状態 */
.key.active {
  background:#00ccff;
  color:black;
  border-color:#00ccff;
  transform:scale(1.1);
}

/* 方向キー配置 */
#dpad {
  display:grid;
  grid-template-columns:60px 60px 60px;
  grid-template-rows:60px 60px 60px;
  gap:5px;
}

.empty {
  visibility:hidden;
}
</style>
</head>

<body>

<div id="debugContainer">

  <!-- D-pad -->
  <div id="dpad">
    <div class="empty"></div>
    <div class="key" id="up">↑</div>
    <div class="empty"></div>

    <div class="key" id="left">←</div>
    <div class="empty"></div>
    <div class="key" id="right">→</div>

    <div class="empty"></div>
    <div class="key" id="down">↓</div>
    <div class="empty"></div>
  </div>

  <!-- ボタン -->
  <div class="row">
    <div class="key" id="A">A</div>
    <div class="key" id="B">B</div>
    <div class="key" id="X">X</div>
    <div class="key" id="Y">Y</div>
  </div>

</div>

<!-- ⭐ ここであなたのgamepad.jsを読み込む -->
<script src="dpad.js"></script>

<script>
function updateUI() {
  const g = window.gamepadState;
  if (!g) {
    requestAnimationFrame(updateUI);
    return;
  }

  for (let key in g) {
    const el = document.getElementById(key);
    if (!el) continue;

    if (g[key]) {
      el.classList.add("active");
    } else {
      el.classList.remove("active");
    }
  }

  requestAnimationFrame(updateUI);
}

updateUI();
</script>

</body>
</html>
