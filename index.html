<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>virtualgamepad Test</title>

<style>
body {
  margin:0;
  background:#111;
  color:white;
  font-family:sans-serif;
}

#debug {
  position:fixed;
  top:10px;
  left:10px;
  background:rgba(0,0,0,0.6);
  padding:12px;
  border-radius:10px;
  font-size:14px;
  line-height:1.6;
}

.on { color:#00ff88; }
.off { color:#666; }

#bigInput {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  font-size:60px;
  font-weight:bold;
  pointer-events:none;
}

#toggleBtn {
  position:fixed;
  bottom:20px;
  right:20px;
  padding:10px 16px;
  border:none;
  border-radius:8px;
  background:#00ff88;
  color:#000;
  font-weight:bold;
}
</style>
</head>
<body>

<div id="debug"></div>
<div id="bigInput"></div>
<button id="toggleBtn">dpadに切替</button>

<script>
let current = "gamepad";
let currentScript = null;

// ===== script切り替え =====
function loadScript(src) {
  if (currentScript) {
    currentScript.remove();
    currentScript = null;
  }

  // UI削除（両対応）
  document.getElementById("zone")?.remove();
  document.getElementById("dpad")?.remove();

  // 状態リセット
  window.gamepadState = {};

  const script = document.createElement("script");
  script.src = src;
  document.body.appendChild(script);

  currentScript = script;
}

// 初期読み込み
loadScript("./gamepad.js");

// ボタン
const btn = document.getElementById("toggleBtn");
btn.onclick = () => {
  if (current === "gamepad") {
    loadScript("./dpad.js");
    current = "dpad";
    btn.textContent = "gamepadに切替";
  } else {
    loadScript("./gamepad.js");
    current = "gamepad";
    btn.textContent = "dpadに切替";
  }
};

// ===== 入力表示 =====
const debug = document.getElementById("debug");
const big = document.getElementById("bigInput");

const keys = [
  "up","down","left","right",
  "A","B","X","Y",
  "L","R","start","select"
];

let order = [];
let prevState = {};

function label(k) {
  switch(k){
    case "up": return "↑";
    case "down": return "↓";
    case "left": return "←";
    case "right": return "→";
    case "start": return "START";
    case "select": return "SELECT";
    default: return k;
  }
}

function update() {
  let html = "";
  const s = window.gamepadState || {};

  // デバッグ
  keys.forEach(k => {
    const v = s[k];
    html += `<div class="${v ? "on":"off"}">${k}: ${v}</div>`;
  });
  debug.innerHTML = html;

  // 押された瞬間
  keys.forEach(k => {
    if (s[k] && !prevState[k]) {
      order.push(k);
    }
  });

  // 離されたら削除
  order = order.filter(k => s[k]);

  // 表示
  big.textContent = order.map(label).join("，");

  prevState = {...s};
  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
