<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>virtualgamepad Test</title>

<style>
body {
  margin:0;
  background:#111;
  color:white;
  font-family:sans-serif;
}

/* デバッグ */
#debug {
  position:fixed;
  top:10px;
  left:10px;
  background:rgba(0,0,0,0.6);
  padding:12px;
  border-radius:10px;
  font-size:14px;
  line-height:1.6;
}

.on { color:#00ff88; }
.off { color:#666; }

/* 中央表示 */
#bigInput {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  font-size:60px;
  font-weight:bold;
  color:white;
  pointer-events:none;
}
</style>
</head>
<body>

<div id="debug"></div>
<div id="bigInput"></div>

<script src="./gamepad.js"></script>

<script>
const debug = document.getElementById("debug");
const big = document.getElementById("bigInput");

const keys = [
  "up","down","left","right",
  "A","B","X","Y",
  "L","R","start","select"
];

function update() {
  let html = "";
  const s = window.gamepadState || {};

  // ===== デバッグ表示 =====
  keys.forEach(k => {
    const v = s[k];
    html += `<div class="${v ? "on":"off"}">${k}: ${v}</div>`;
  });
  debug.innerHTML = html;

  // ===== 今押してるものだけ =====
  let current = [];

  if (s.up) current.push("↑");
  if (s.down) current.push("↓");
  if (s.left) current.push("←");
  if (s.right) current.push("→");

  if (s.A) current.push("A");
  if (s.B) current.push("B");
  if (s.X) current.push("X");
  if (s.Y) current.push("Y");

  if (s.L) current.push("L");
  if (s.R) current.push("R");

  if (s.start) current.push("START");
  if (s.select) current.push("SELECT");

  // カンマ区切り
  big.textContent = current.join("，");

  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
