<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>virtualgamepad Test</title>

<style>
body {
  margin:0;
  background:#111;
  color:white;
  font-family:sans-serif;
}

#debug {
  position:fixed;
  top:10px;
  left:10px;
  background:rgba(0,0,0,0.6);
  padding:12px;
  border-radius:10px;
  font-size:14px;
  line-height:1.6;
}

.on { color:#00ff88; }
.off { color:#666; }

#bigInput {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  font-size:60px;
  font-weight:bold;
  pointer-events:none;
}
    /* 右上固定ボタン */
  .switch-btn {
    position: fixed;
    top: 20px;
    right: 20px;

    padding: 10px 18px;
    border: none;
    border-radius: 999px;

    background: linear-gradient(135deg, #3b82f6, #9333ea);
    color: white;
    font-size: 14px;
    font-weight: bold;

    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);

    transition: all 0.2s ease;
  }

  .switch-btn:hover {
    transform: translateY(-2px) scale(1.05);
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  }

  .switch-btn:active {
    transform: scale(0.95);
  }
</style>
</head>
<body>

<div id="debug"></div>
<div id="bigInput"></div>


  <script id="dynamicScript"></script>

<button class="switch-btn" onclick="switchScript()">切り替え</button>
  
<script>
const debug = document.getElementById("debug");
const big = document.getElementById("bigInput");

const keys = [
  "up","down","left","right",
  "A","B","X","Y",
  "L","R","start","select"
];

// 押された順を保持
let order = [];
let prevState = {};

function label(k) {
  switch(k){
    case "up": return "↑";
    case "down": return "↓";
    case "left": return "←";
    case "right": return "→";
    case "start": return "START";
    case "select": return "SELECT";
    default: return k;
  }
}

function update() {
  let html = "";
  const s = window.gamepadState || {};

  // ===== デバッグ =====
  keys.forEach(k => {
    const v = s[k];
    html += `<div class="${v ? "on":"off"}">${k}: ${v}</div>`;
  });
  debug.innerHTML = html;

  // ===== 押された瞬間を検出 =====
  keys.forEach(k => {
    if (s[k] && !prevState[k]) {
      // 新しく押された → 右に追加
      order.push(k);
    }
  });

  // ===== 離されたキーを削除 =====
  order = order.filter(k => s[k]);

  // ===== 表示 =====
  const text = order.map(label).join("，");
  big.textContent = text;

  // 状態保存
  prevState = {...s};

  requestAnimationFrame(update);
}

update();
  let current = "a.js";

  function switchScript() {
    const script = document.getElementById("dynamicScript");

    if (current === "gamepad.js") {
      script.src = "dpad.js";
      current = "dpad.js";
    } else {
      script.src = "gamepad.js";
      current = "gamepad.js";
    }
  }

  document.getElementById("dynamicScript").src = current;
</script>

</body>
</html>
