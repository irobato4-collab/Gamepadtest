<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>virtualgamepad Test</title>

<style>
body {
  margin:0;
  background:#111;
  color:white;
  font-family:sans-serif;
}

/* デバッグ表示（そのまま） */
#debug {
  position:fixed;
  top:10px;
  left:10px;
  background:rgba(0,0,0,0.6);
  padding:12px;
  border-radius:10px;
  font-size:14px;
  line-height:1.6;
}

.on { color:#00ff88; }
.off { color:#666; }

/* 中央の入力表示 */
#bigInput {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  font-size:60px;
  font-weight:bold;
  color:white;
  pointer-events:none;
}
</style>
</head>
<body>

<div id="debug"></div>
<div id="bigInput"></div>

<!-- 君のゲームパッド -->
<script src="./gamepad.js"></script>

<script>
const debug = document.getElementById("debug");
const big = document.getElementById("bigInput");

const keys = [
  "up","down","left","right",
  "A","B","X","Y",
  "L","R","start","select"
];

function update() {
  let html = "";
  const s = window.gamepadState || {};

  // ===== デバッグ表示 =====
  keys.forEach(k => {
    const v = s[k];
    html += `<div class="${v ? "on":"off"}">${k}: ${v}</div>`;
  });

  debug.innerHTML = html;

  // ===== 中央ででっかく表示 =====
  let text = "";

  if (s.up) text += "↑";
  if (s.down) text += "↓";
  if (s.left) text += "←";
  if (s.right) text += "→";

  if (s.A) text += "A";
  if (s.B) text += "B";
  if (s.X) text += "X";
  if (s.Y) text += "Y";
  if (s.L) text += "L";
  if (s.R) text += "R";
  if (s.start) text += "START";
  if (s.select) text += "SELECT";

  big.textContent = text;

  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
