<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>virtualgamepad Test</title>

<style>
body {
  margin:0;
  background:#111;
  color:white;
  font-family:sans-serif;
}

/* 表示パネル */
#debug {
  position:fixed;
  top:10px;
  left:10px;
  background:rgba(0,0,0,0.6);
  padding:12px;
  border-radius:10px;
  font-size:14px;
  line-height:1.6;
}

.on { color:#00ff88; }
.off { color:#666; }
</style>
</head>
<body>

<div id="debug"></div>

<!-- ★ ここで君のJSを読み込む -->
<script src="./gamepad.js"></script>

<script>
const debug = document.getElementById("debug");

const keys = [
  "up","down","left","right",
  "A","B","X","Y",
  "L","R","start","select"
];

function update() {
  let html = "";

  keys.forEach(k => {
    const v = window.gamepadState?.[k];
    html += `<div class="${v ? "on":"off"}">${k}: ${v}</div>`;
  });

  // 同時押し検出
  const active = keys.filter(k => window.gamepadState?.[k]);
  html += "<hr>";
  html += "<div>同時押し: " + (active.join(", ") || "なし") + "</div>";

  debug.innerHTML = html;
  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
