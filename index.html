<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ゲームパッドテスト</title>
</head>
<body>
<h1>ゲームパッドボタン押下テスト</h1>
<p id="status">ボタンを押してください</p>

<!-- ここで外部ゲームパッドを読み込む -->
<script src="d.js"></script>

<script>
// 表示用要素取得
const status = document.getElementById("status");

// 受け取るカスタムイベント一覧
const buttons = ["gp-A", "gp-B", "gp-X", "gp-Y",
                 "gp-L", "gp-R", "gp-up", "gp-down", "gp-left", "gp-right",
                 "gp-start", "gp-select"];

// 各ボタンのカスタムイベントを監視
buttons.forEach(btnId => {
    document.addEventListener(btnId + "-pressed", () => {
        status.textContent = btnId + " が押されました！";
    });
});
</script>
</body>
  </html>
