<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ジャンプゲーム</title>

<style>
body {
  margin: 0;
  background: #222;
  overflow: hidden;
}

/* キャラ */
#player {
  position: absolute;
  width: 50px;
  height: 50px;
  background: cyan;
  left: 100px;
  top: 100px;
}

/* 地面 */
#ground {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 80px;
  background: #444;
}
</style>
</head>

<body>

<div id="player"></div>
<div id="ground"></div>

<!-- ⭐ 自分のgamepad.js -->
<script src="gamepad.js"></script>

<script>
const player = document.getElementById("player");

let x = 100;
let y = 100;

// ⭐ 物理っぽい設定
let velocityY = 0;
const gravity = 0.5;
const jumpPower = -10;

const groundY = window.innerHeight - 80 - 50; // 地面の位置

function gameLoop() {

  const g = window.gamepadState;

  // 横移動
  if (g.left) x -= 4;
  if (g.right) x += 4;

  // ⭐ ジャンプ（地面にいるときだけ）
  if (g.A && y >= groundY) {
    velocityY = jumpPower;
  }

  // 重力
  velocityY += gravity;
  y += velocityY;

  // 地面に着地
  if (y > groundY) {
    y = groundY;
    velocityY = 0;
  }

  // 画面に反映
  player.style.left = x + "px";
  player.style.top = y + "px";

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
