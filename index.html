<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ゲームテスト</title>

<style>
body {
  margin: 0;
  background: #222;
  overflow: hidden;
}

/* キャラ */
#player {
  position: absolute;
  width: 50px;
  height: 50px;
  background: cyan;
  left: 100px;
  top: 100px;
}
</style>
</head>

<body>

<div id="player"></div>

<!-- ⭐ ここに自分のCDN -->
<script src="gamepad.js"></script>

<script>
const player = document.getElementById("player");

let x = 100;
let y = 100;
const speed = 4;

function gameLoop() {

  const g = window.gamepadState;

  // 移動
  if (g.up) y -= speed;
  if (g.down) y += speed;
  if (g.left) x -= speed;
  if (g.right) x += speed;

  // Aでちょっと加速
  if (g.A) {
    x += 2;
  }

  // Bで戻る（テスト用）
  if (g.B) {
    x -= 2;
  }

  // 画面に反映
  player.style.left = x + "px";
  player.style.top = y + "px";

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
