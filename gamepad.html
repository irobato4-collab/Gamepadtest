<head>

<style>
/* ===== 完全リセット ===== */
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
}

/* ===== ここが重要（ズレ修正）===== */
body {
  position: fixed;
  inset: 0;
  overflow: visible;

  /* セーフエリア分を打ち消す */
  transform: translateY(calc(-1 * env(safe-area-inset-top)));
}
</style>

</head>

</body>
